services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: commit-platform-dev

    working_dir: /app

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: development

    volumes:
      - .:/app
      - /app/node_modules

    command: sh -c "yarn install --frozen-lockfile && yarn db:generate && yarn dev"

    stdin_open: true
    tty: true

    restart: unless-stopped